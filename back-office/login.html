<!-- Gabarit de Connexion Administration (Back-Office) -->
<div class="auth-wrapper">
    <div class="card auth-container" style="border-top: 6px solid var(--danger-color);">
        <div class="auth-logo">
            <h1><i class="fa-solid fa-user-shield text-danger"></i> Back-Office</h1>
            <p class="text-muted">Espace d'administration & modération</p>
        </div>

        <form id="admin-login-form">
            <div class="form-group">
                <label for="admin-email">Adresse Email Administrateur</label>
                <input type="email" id="admin-email" class="form-control" placeholder="admin@social.com" required>
            </div>
            <div class="form-group">
                <label for="admin-password">Mot de passe</label>
                <input type="password" id="admin-password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-danger" style="width: 100%; margin-top: 10px;">Accéder au Dashboard</button>
        </form>
        
        <div class="auth-links">
            <a href="#auth" class="text-primary"><i class="fa-solid fa-arrow-left"></i> Retourner au Réseau Social</a>
        </div>
    </div>
</div>

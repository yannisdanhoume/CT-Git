<!-- Gabarit des amis et suggestions -->
<div style="max-width: 800px; margin: 0 auto;">
    
    <!-- Section 1 : Demandes d'amis en attente -->
    <div style="margin-bottom: 30px;">
        <h3 style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-bell text-warning"></i> Demandes d'invitations reçues
        </h3>
        <div id="requests-list-container" style="display: flex; flex-direction: column; gap: 12px;">
            <p class="text-muted">Chargement des demandes...</p>
        </div>
    </div>
    
    <!-- Section 2 : Invitations envoyées -->
    <div style="margin-bottom: 30px;">
        <h3 style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-paper-plane text-primary"></i> Invitations envoyées
        </h3>
        <div id="sent-requests-list-container" style="display: flex; flex-direction: column; gap: 12px;">
            <p class="text-muted">Chargement des invitations envoyées...</p>
        </div>
    </div>

    <!-- Section 3 : Amis connectés -->
    <div style="margin-bottom: 30px;">
        <h3 style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-user-group text-primary"></i> Mes Amis
        </h3>
        <div id="friends-list-container" style="display: flex; flex-direction: column; gap: 12px;">
            <p class="text-muted">Chargement de vos amis...</p>
        </div>
    </div>

    <!-- Section 4 : Suggestions d'autres membres -->
    <div>
        <h3 style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-users text-success"></i> Découvrir d'autres profils
        </h3>
        <div id="suggestions-list-container" style="display: flex; flex-direction: column; gap: 12px;">
            <p class="text-muted">Chargement des suggestions...</p>
        </div>
    </div>

</div>
